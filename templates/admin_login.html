<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiR100 — Admin Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0A0E17;
    --panel:   #111827;
    --border:  #1E293B;
    --accent:  #00D4FF;
    --accent2: #0088AA;
    --text:    #E2E8F0;
    --muted:   #64748B;
    --danger:  #EF4444;
    --success: #10B981;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Grid tecnico di sfondo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 60% 40%, rgba(0,136,170,0.12) 0%, transparent 60%);
    pointer-events: none;
  }

  .login-box {
    position: relative;
    z-index: 1;
    width: 420px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 48px 40px;
    box-shadow: 0 0 60px rgba(0,212,255,0.06), 0 24px 48px rgba(0,0,0,0.6);
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .logo-area {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .logo-icon::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid var(--accent2);
    opacity: 0.5;
  }

  .logo-icon svg { color: var(--accent); }

  .logo-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
  }

  .field-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    border-radius: 2px;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 20px rgba(0,212,255,0.1);
  }

  .btn-login {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 0;
  }

  .btn-login:hover::before { transform: translateX(0); }
  .btn-login:hover { color: var(--bg); }
  .btn-login span { position: relative; z-index: 1; }

  .errore {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #FCA5A5;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 20px;
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .version-tag {
    text-align: center;
    margin-top: 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    opacity: 0.5;
    letter-spacing: 1px;
  }

  .scan-line {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
    opacity: 0.3;
    animation: scanline 4s linear infinite;
  }

  @keyframes scanline {
    from { top: 0; }
    to   { top: 100vh; }
  }
</style>
</head>
<body>
<div class="scan-line"></div>

<div class="login-box">
  <div class="logo-area">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="0"/>
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="3" x2="12" y2="7"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
          <line x1="3" y1="12" x2="7" y2="12"/>
          <line x1="17" y1="12" x2="21" y2="12"/>
        </svg>
      </div>
      <span class="logo-text">MiR100</span>
    </div>
    <div class="logo-sub">Pannello di controllo · Accesso riservato</div>
  </div>

  {% if errore %}
  <div class="errore">⚠ {{ errore }}</div>
  {% endif %}

  <div class="field-group">
    <label>Username</label>
    <input type="text" id="usr" autocomplete="username" placeholder="admin" />
  </div>
  <div class="field-group">
    <label>Password</label>
    <input type="password" id="pwd" autocomplete="current-password" placeholder="••••••••" />
  </div>

  <button class="btn-login" onclick="doLogin()">
    <span>Accedi al sistema</span>
  </button>

  <div class="version-tag">MiR100 Warehouse v2.0 · Sistema gestione magazzino</div>
</div>

<script>
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const btn = document.querySelector('.btn-login');
    btn.querySelector('span').textContent = 'Autenticazione...';
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        username: document.getElementById('usr').value,
        password: document.getElementById('pwd').value,
      })
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/admin';
    } else {
      btn.querySelector('span').textContent = 'Accedi al sistema';
      document.querySelector('.logo-sub').textContent = '⚠ ' + data.msg;
      document.querySelector('.logo-sub').style.color = 'var(--danger)';
    }
  }
</script>
</body>
</html>
